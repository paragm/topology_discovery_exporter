---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go Mod Tidy
        run: go mod tidy

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Vet
        run: go vet ./...
